<script>
/* ── DEFAULT DATA ──────────────────────────────────────────────────── */
const DEFAULT_DATA = { "tiendas": [] };

/* ── CONFIG ──────────────────────────────────────── */
const API_URL = '/api/stockforge'; // ✅ NUEVO: endpoint en Vercel
const LOGO_KEY = 'effi_logo_v1';
const ROTULO_LOGO_KEY = 'effi_rotulo_logo_v1';
const CACHE_KEY = 'effi_inventario_cache_v1';
const SESSION_KEY = 'effi_coord_session_v1';

/* ── STATE ─────────────────────────────────────────── */
let appData = { tiendas: [] };
let coordToken = null;
let coordUnlocked = false;
let pinBuffer = '';
let isOffline = false;

/* ── API HELPERS ───────────────────────────────────── */
async function apiGet(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function apiPost(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (coordToken) headers['Authorization'] = 'Bearer ' + coordToken;
  const r = await fetch(path, { method: 'POST', headers, body: JSON.stringify(body) });
  
  if (r.status === 401) {
    lockCoord();
    showToast('⏳ La sesión expiró. Vuelve a iniciar sesión.', 'danger');
    throw new Error('Sesión expirada');
  }
  
  if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Error'); }
  return r.json();
}

async function apiPatch(path, body) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + coordToken };
  const r = await fetch(path, { method: 'PATCH', headers, body: JSON.stringify(body) });
  
  if (r.status === 401) {
    lockCoord();
    showToast('⏳ La sesión expiró. Vuelve a iniciar sesión.', 'danger');
    throw new Error('Sesión expirada');
  }
  
  if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Error'); }
  return r.json();
}

async function apiDelete(path, body) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + coordToken };
  const r = await fetch(path, { method: 'DELETE', headers, body: JSON.stringify(body) });
  
  if (r.status === 401) {
    lockCoord();
    showToast('⏳ La sesión expiró. Vuelve a iniciar sesión.', 'danger');
    throw new Error('Sesión expirada');
  }
  
  if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Error'); }
  return r.json();
}

/* ── OFFLINE BANNER ─────────────────────────────────── */
function showOfflineBanner() {
  if (document.getElementById('offline-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'offline-banner';
  banner.innerHTML = '⚠️ Sin conexión — usando inventario en caché. Los cambios no se guardarán.';
  banner.style.cssText = `
    position:fixed;top:0;left:0;right:0;z-index:9000;
    background:#c98e00;color:#fff;text-align:center;
    padding:8px 16px;font-size:13px;font-weight:600;
    font-family:'DM Sans',sans-serif;
  `;
  document.body.prepend(banner);
}

function hideOfflineBanner() {
  const b = document.getElementById('offline-banner');
  if (b) b.remove();
}

// ═══════════════ NUEVAS FUNCIONES DE CARGA/GUARDADO (SUPABASE) ═══════════════
async function load() {
  try {
    showToast('Cargando inventario...', '');
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('Error al cargar');
    const data = await response.json();
    
    state.zones = data.zonas || [];
    state.racks = data.racks || [];
    state.cells = data.cells || {};
    state.people = data.people || [];
    state.tiendas = data.tiendas || [];
    state.movements = data.movements || [];
    
    isOffline = false;
    hideOfflineBanner();
    hideToast();
    return true;
  } catch (e) {
    console.error('Error cargando:', e);
    // Intentar usar cache local
    const cached = localStorage.getItem('stockforge_v4');
    if (cached) {
      const d = JSON.parse(cached);
      state.zones = d.zones || [];
      state.racks = d.racks || [];
      state.cells = d.cells || {};
      state.people = d.people || [];
      state.tiendas = d.tiendas || [];
      state.movements = d.movements || [];
      isOffline = true;
      showOfflineBanner();
      hideToast();
      showToast('Usando inventario en caché', 'danger');
      return true;
    }
    showToast('Sin conexión y sin caché', 'danger');
    return false;
  }
}

async function save() {
  if (isOffline) {
    showToast('Sin conexión — no se pueden guardar cambios', 'danger');
    return;
  }
  try {
    const payload = {
      zones: state.zones,
      racks: state.racks,
      cells: state.cells,
      people: state.people,
      tiendas: state.tiendas,
      movements: state.movements
    };
    
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) throw new Error('Error al guardar');
    
    // También guardar en localStorage como backup
    localStorage.setItem('stockforge_v4', JSON.stringify(payload));
    
    const i = document.getElementById('save-ind');
    i.classList.add('show');
    clearTimeout(i._t);
    i._t = setTimeout(() => i.classList.remove('show'), 2000);
  } catch (e) {
    console.error('Error guardando:', e);
    showToast('Error al guardar en el servidor', 'danger');
  }
}

/* ── LOAD DATA FROM API (compatibilidad con código existente) ── */
async function loadData() {
  await load();
}

function hideToast() {
  const t = document.getElementById('toast');
  t.className = 'toast';
}

/* ── COORDINADOR LOGIN ──────────────────────────────── */
function activateCoord(token) {
  coordToken = token;
  coordUnlocked = true;
  sessionStorage.setItem(SESSION_KEY, token);
  const btn = document.getElementById('btn-coord-toggle');
  btn.classList.add('active');
  document.getElementById('coord-icon').textContent = '⚙️';
  document.getElementById('coord-label').textContent = 'Coordinador Activo';
}

async function checkPin() {
  const email = document.getElementById('coord-email')?.value?.trim();
  const password = document.getElementById('coord-password')?.value?.trim();
  if (!email || !password) return;

  try {
    const data = await apiPost('/api/auth', { email, password });
    activateCoord(data.token);
    closePinModal();
    document.getElementById('coord-panel').classList.add('visible');
    showToast('✅ Sesión iniciada', 'success');
  } catch(e) {
    document.getElementById('pin-error').textContent = 'Credenciales incorrectas';
  }
}

async function changePin() {
  const nuevoPin = document.getElementById('c-pin-nuevo').value;
  const confirmPin = document.getElementById('c-pin-confirm').value;

  if (!nuevoPin || nuevoPin.length < 6) {
    showToast('La contraseña debe tener al menos 6 caracteres', 'danger');
    return;
  }
  if (nuevoPin !== confirmPin) {
    showToast('Las contraseñas no coinciden', 'danger');
    return;
  }
  if (!coordToken) {
    showToast('Debes iniciar sesión primero', 'danger');
    return;
  }

  try {
    const response = await fetch('/api/config', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${coordToken}`
      },
      body: JSON.stringify({ password: nuevoPin })
    });

    if (response.status === 401) {
      lockCoord();
      showToast('Sesión expirada. Vuelve a iniciar sesión.', 'danger');
      return;
    }

    const result = await response.json();

    if (response.ok) {
      showToast('✅ Contraseña actualizada correctamente', 'success');
      document.getElementById('c-pin-nuevo').value = '';
      document.getElementById('c-pin-confirm').value = '';
    } else {
      showToast(result.error || 'Error al cambiar la contraseña', 'danger');
    }
  } catch (error) {
    console.error('Error al cambiar PIN:', error);
    showToast('Error de conexión', 'danger');
  }
}

/* ── TOAST ─────────────────────────────────────────── */
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2800);
}

/* ── POPULATE SELECTS ──────────────────────────────── */
function populateTiendas() {
  const selectors = ['select-tienda', 'c-select-tienda', 'm-select-tienda', 'bulk-select-tienda', 'c-rename-tienda-select'];
  selectors.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    el.innerHTML = '<option value="">-- Seleccione --</option>';
    appData.tiendas.forEach((t, i) => {
      el.add(new Option(t.nombre, i));
    });
    if (cur !== '') el.value = cur;
  });
}

/* ── OFFLINE GUARD ──────────────────────────────────── */
function guardOffline() {
  if (isOffline) {
    showToast('Sin conexión — no se pueden guardar cambios', 'danger');
    return true;
  }
  return false;
}

async function renameTienda() {
  if (guardOffline()) return;
  const idx = document.getElementById('c-rename-tienda-select').value;
  const nuevoNombre = document.getElementById('c-rename-tienda-nombre').value.trim();
  if (idx === '') return showToast('Selecciona una tienda', 'danger');
  if (!nuevoNombre) return showToast('Escribe el nombre nuevo', 'danger');
  const tienda = appData.tiendas[idx];
  try {
    await apiPatch('/api/tiendas', { id: tienda.id, nombre: nuevoNombre });
    const nombreAnterior = tienda.nombre;
    await loadData();
    populateTiendas();
    document.getElementById('c-rename-tienda-nombre').value = '';
    showToast(`✅ "${nombreAnterior}" → "${nuevoNombre}"`, 'success');
  } catch(e) { showToast(e.message, 'danger'); }
}

let inventarioCompleto = [];

function populateInventario(tiendaIdx, prodSel, idSel) {
  const searchInput = document.getElementById('search-producto');
  
  prodSel.innerHTML = '<option value="">-- Producto --</option>';
  idSel.innerHTML = '<option value="">-- ID --</option>';
  
  if (tiendaIdx === '' || !appData.tiendas[tiendaIdx]) {
    inventarioCompleto = [];
    if (searchInput) {
      searchInput.value = '';
      searchInput.disabled = true;
    }
    return;
  }
  
  inventarioCompleto = [...appData.tiendas[tiendaIdx].inventario]
    .sort((a, b) => parseInt(a.id) - parseInt(b.id));
  
  if (searchInput) {
    searchInput.disabled = false;
    searchInput.value = '';
  }
  
  filterProductos();
}

function filterProductos() {
  const searchTerm = document.getElementById('search-producto')?.value.trim().toLowerCase() || '';
  const prodSel = document.getElementById('select-producto');
  const idSel = document.getElementById('select-id');
  
  if (!prodSel || !idSel) return;
  
  prodSel.innerHTML = '<option value="">-- Producto --</option>';
  idSel.innerHTML = '<option value="">-- ID --</option>';
  
  const filtrado = inventarioCompleto.filter(item =>
    item.producto.toLowerCase().includes(searchTerm) ||
    item.id.toString().includes(searchTerm)
  );
  
  filtrado.forEach(item => {
    prodSel.add(new Option(item.producto, item.id));
    idSel.add(new Option(item.id, item.id));
  });
  
  if (filtrado.length === 1) {
    prodSel.value = filtrado[0].id;
    idSel.value = filtrado[0].id;
  }
  
  updatePreview();
}

/* ── TAB SWITCH ────────────────────────────────────── */
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const tabs = ['tab-add-item','tab-add-tienda','tab-manage','tab-config'];
  const idx = tabs.indexOf(id);
  if (idx >= 0) document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (id === 'tab-add-tienda') populateTiendas();
}

/* ── COORD ACTIONS ─────────────────────────────────── */
async function addProducto() {
  if (guardOffline()) return;
  const tiendaIdx = document.getElementById('c-select-tienda').value;
  const newId = document.getElementById('c-new-id').value.trim();
  const newNombre = document.getElementById('c-new-nombre').value.trim();
  if (tiendaIdx === '') return showToast('Selecciona una tienda', 'danger');
  if (!newId) return showToast('El ID es requerido', 'danger');
  if (!newNombre) return showToast('El nombre es requerido', 'danger');
  const tienda = appData.tiendas[tiendaIdx];
  try {
    await apiPost('/api/productos', { tienda_id: tienda.id, codigo: newId, nombre: newNombre });
    await loadData();
    populateTiendas();
    renderManageList();
    const mainIdx = document.getElementById('select-tienda').value;
    if (mainIdx === tiendaIdx) {
      populateInventario(tiendaIdx, document.getElementById('select-producto'), document.getElementById('select-id'));
    }
    document.getElementById('c-new-id').value = '';
    document.getElementById('c-new-nombre').value = '';
    showToast(`✅ Producto "${newNombre}" agregado`, 'success');
  } catch(e) { showToast(e.message, 'danger'); }
}

async function addTienda() {
  if (guardOffline()) return;
  const nombre = document.getElementById('c-tienda-nombre').value.trim();
  if (!nombre) return showToast('Escribe un nombre', 'danger');
  try {
    await apiPost('/api/tiendas', { nombre });
    await loadData();
    populateTiendas();
    document.getElementById('c-tienda-nombre').value = '';
    showToast(`✅ Tienda "${nombre}" creada`, 'success');
  } catch(e) { showToast(e.message, 'danger'); }
}

async function removeProducto(tiendaIdx, productId) {
  if (guardOffline()) return;
  const inv = appData.tiendas[tiendaIdx].inventario;
  const item = inv.find(i => i.id === productId);
  if (!item) return;
  try {
    await apiDelete('/api/productos', { id: item._dbId });
    await loadData();
    renderManageList();
    const mainIdx = document.getElementById('select-tienda').value;
    if (mainIdx == tiendaIdx) {
      populateInventario(tiendaIdx, document.getElementById('select-producto'), document.getElementById('select-id'));
      updatePreview();
    }
    showToast('Producto eliminado');
  } catch(e) { showToast(e.message, 'danger'); }
}

async function deleteTienda() {
  if (guardOffline()) return;
  const idx = document.getElementById('m-select-tienda').value;
  if (idx === '') return showToast('Selecciona una tienda', 'danger');
  const tienda = appData.tiendas[idx];
  if (!confirm(`¿Eliminar la tienda "${tienda.nombre}" y todo su inventario?`)) return;
  try {
    await apiDelete('/api/tiendas', { id: tienda.id });
    await loadData();
    populateTiendas();
    document.getElementById('manage-inv-list').innerHTML =
      '<div class="inv-item"><span class="item-name" style="color:var(--muted)">Selecciona una tienda</span></div>';
    showToast(`Tienda "${tienda.nombre}" eliminada`, 'danger');
  } catch(e) { showToast(e.message, 'danger'); }
}

function renderManageList() {
  const idx = document.getElementById('m-select-tienda').value;
  const container = document.getElementById('manage-inv-list');
  if (idx === '' || !appData.tiendas[idx]) {
    container.innerHTML = '<div class="inv-item"><span class="item-name" style="color:var(--muted)">Selecciona una tienda</span></div>';
    return;
  }
  const inv = [...appData.tiendas[idx].inventario].sort((a,b) => parseInt(a.id) - parseInt(b.id));
  if (!inv.length) {
    container.innerHTML = '<div class="inv-item"><span class="item-name" style="color:var(--muted)">Sin productos</span></div>';
    return;
  }
  container.innerHTML = inv.map(item => `
    <div class="inv-item" data-original-id="${item.id}" data-db-id="${item._dbId}">
      <input class="input-id" value="${item.id}" title="ID"
        onkeydown="if(event.key==='Enter') this.nextElementSibling.focus()">
      <input class="input-name" value="${item.producto.replace(/"/g,'&quot;')}" title="Nombre"
        onkeydown="if(event.key==='Enter') this.nextElementSibling.focus()">
      <input class="input-ubic" value="${item.ubicacion||''}" title="Ubicación (ej: A-3-2)" placeholder="Ubic."
        onkeydown="if(event.key==='Enter') this.nextElementSibling.click()">
      <button class="btn-save-item" onclick="saveProductoEdit(${idx}, '${item.id}', this.closest('.inv-item'))" title="Guardar">💾</button>
      <button onclick="removeProducto(${idx}, '${item.id}')" title="Eliminar">✕</button>
    </div>
  `).join('');
}

async function saveProductoEdit(tiendaIdx, originalId, row) {
  if (guardOffline()) return;
  const newId = row.querySelector('.input-id').value.replace(/\D/g, '').trim();
  const newNombre = row.querySelector('.input-name').value.trim();
  const newUbic = row.querySelector('.input-ubic').value.trim().toUpperCase();
  const dbId = row.dataset.dbId;

  if (!newId) return showToast('El ID no puede estar vacío', 'danger');
  if (!newNombre) return showToast('El nombre no puede estar vacío', 'danger');

  try {
    await apiPatch('/api/productos', { id: dbId, codigo: newId, nombre: newNombre, ubicacion: newUbic || null });
    await loadData();
    renderManageList();
    const mainIdx = document.getElementById('select-tienda').value;
    if (mainIdx == tiendaIdx) {
      populateInventario(tiendaIdx, document.getElementById('select-producto'), document.getElementById('select-id'));
      updatePreview();
    }
    showToast('✅ Producto actualizado', 'success');
  } catch(e) { showToast(e.message, 'danger'); }
}

/* ── LOGIN MODAL ────────────────────────────────────── */
function openPinModal() {
  document.getElementById('pin-error').textContent = '';
  document.getElementById('coord-email').value = '';
  document.getElementById('coord-password').value = '';
  document.getElementById('pin-overlay').classList.add('show');
  setTimeout(() => document.getElementById('coord-email').focus(), 150);
}

function closePinModal() {
  document.getElementById('pin-overlay').classList.remove('show');
  pinBuffer = '';
}

function toggleCoordMode() {
  if (coordUnlocked) {
    const panel = document.getElementById('coord-panel');
    panel.classList.toggle('visible');
  } else {
    openPinModal();
  }
}

function lockCoord() {
  coordToken = null;
  coordUnlocked = false;
  sessionStorage.removeItem(SESSION_KEY);
  const btn = document.getElementById('btn-coord-toggle');
  btn.classList.remove('active');
  document.getElementById('coord-icon').textContent = '🔒';
  document.getElementById('coord-label').textContent = 'Modo Coordinador';
  document.getElementById('coord-panel').classList.remove('visible');
  showToast('Sesión de coordinador cerrada');
}

/* ── LOGO ───────────────────────────────────────────── */
function applyLogo(base64) {
  const labelImg = document.getElementById('label-logo-img');
  const labelText = document.getElementById('label-logo-text');
  const brandImg = document.getElementById('brand-logo-img');
  const brandText = document.getElementById('brand-logo-text');
  const previewImg = document.getElementById('logo-preview-img');
  const previewPlaceholder = document.getElementById('logo-preview-placeholder');
  if (base64) {
    labelImg.src = base64;
    labelImg.style.display = 'block';
    labelText.style.display = 'none';
    brandImg.src = base64;
    brandImg.style.display = 'block';
    brandText.style.display = 'none';
    previewImg.src = base64;
    previewImg.style.display = 'block';
    previewPlaceholder.style.display = 'none';
  } else {
    labelImg.style.display = 'none';
    labelText.style.display = 'block';
    brandImg.style.display = 'none';
    brandText.style.display = 'block';
    previewImg.style.display = 'none';
    previewPlaceholder.style.display = 'block';
  }
}

function logImport(message, type = 'info') {
  const logDiv = document.getElementById('import-log');
  if (!logDiv) return;
  
  const timestamp = new Date().toLocaleTimeString();
  let color = '#a6e22e';
  if (type === 'error') color = '#f92672';
  else if (type === 'warn') color = '#e6db74';
  else if (type === 'success') color = '#a6e22e';
  
  const entry = document.createElement('div');
  entry.style.color = color;
  entry.style.marginBottom = '2px';
  entry.textContent = `[${timestamp}] ${message}`;
  
  logDiv.appendChild(entry);
  const container = document.getElementById('import-log-container');
  container.scrollTop = container.scrollHeight;
  
  if (logDiv.children.length > 100) {
    logDiv.removeChild(logDiv.firstChild);
  }
}

function clearImportLog() {
  const logDiv = document.getElementById('import-log');
  if (logDiv) logDiv.innerHTML = '';
  logImport('— Registro limpiado —');
}

function handleLogoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const b64 = e.target.result;
    localStorage.setItem(LOGO_KEY, b64);
    if (coordToken) {
      try { await apiPost('/api/config', { clave: LOGO_KEY, valor: b64 }); } catch(e) {}
    }
    applyLogo(b64);
    showToast('✅ Logo actualizado', 'success');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function removeLogo() {
  localStorage.removeItem(LOGO_KEY);
  if (coordToken) {
    try { await apiPost('/api/config', { clave: LOGO_KEY, valor: '' }); } catch(e) {}
  }
  applyLogo(null);
  showToast('Logo eliminado');
}

async function loadLogo() {
  try {
    const config = await apiGet('/api/config');
    if (config[LOGO_KEY]) {
      localStorage.setItem(LOGO_KEY, config[LOGO_KEY]);
      applyLogo(config[LOGO_KEY]);
      return;
    }
  } catch(e) {}
  const saved = localStorage.getItem(LOGO_KEY);
  if (saved) applyLogo(saved);
}

/* ── RÓTULO LOGO ────────────────────────────────────── */
function applyRotuloLogo(base64) {
  const previewImg = document.getElementById('rotulo-logo-preview-img');
  const previewPlaceholder = document.getElementById('rotulo-logo-preview-placeholder');
  if (base64) {
    previewImg.src = base64;
    previewImg.style.display = 'block';
    previewPlaceholder.style.display = 'none';
  } else {
    previewImg.style.display = 'none';
    previewPlaceholder.style.display = 'block';
  }
  updateRotuloPrevLogo();
}

function handleRotuloLogoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const b64 = e.target.result;
    localStorage.setItem(ROTULO_LOGO_KEY, b64);
    if (coordToken) {
      try { await apiPost('/api/config', { clave: ROTULO_LOGO_KEY, valor: b64 }); } catch(e) {}
    }
    applyRotuloLogo(b64);
    showToast('✅ Logo del rótulo actualizado', 'success');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function removeRotuloLogo() {
  localStorage.removeItem(ROTULO_LOGO_KEY);
  if (coordToken) {
    try { await apiPost('/api/config', { clave: ROTULO_LOGO_KEY, valor: '' }); } catch(e) {}
  }
  applyRotuloLogo(null);
  showToast('Logo del rótulo eliminado');
}

async function loadRotuloLogo() {
  try {
    const config = await apiGet('/api/config');
    if (config[ROTULO_LOGO_KEY]) {
      localStorage.setItem(ROTULO_LOGO_KEY, config[ROTULO_LOGO_KEY]);
      applyRotuloLogo(config[ROTULO_LOGO_KEY]);
      return;
    }
  } catch(e) {}
  const saved = localStorage.getItem(ROTULO_LOGO_KEY);
  if (saved) applyRotuloLogo(saved);
}

/* ── JSON EXPORT / IMPORT ───────────────────────────── */
function exportJSON() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'etiquetas_inventario.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ JSON exportado', 'success');
}

async function handleJSONImport(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.tiendas || !Array.isArray(parsed.tiendas))
        return showToast('JSON inválido: falta "tiendas"', 'danger');

      if (!coordToken)
        return showToast('Debés estar en modo Coordinador para importar', 'danger');

      clearImportLog();
      logImport('🚀 Iniciando importación...', 'info');
      logImport(`📦 Total de tiendas en archivo: ${parsed.tiendas.length}`, 'info');
      showToast('Importando... espere', '');

      let tiendasCreadas = 0;
      let tiendasExistentes = 0;
      let productosAgregados = 0;
      let productosOmitidos = 0;

      const tiendasExistentesMap = new Map();
      appData.tiendas.forEach(t => {
        tiendasExistentesMap.set(t.nombre.trim().toLowerCase(), t.id);
      });

      for (let i = 0; i < parsed.tiendas.length; i++) {
        const tienda = parsed.tiendas[i];
        const nombreTienda = tienda.nombre.trim();
        const nombreNormalizado = nombreTienda.toLowerCase();
        let tiendaId;

        logImport(`🏪 Procesando tienda ${i+1}/${parsed.tiendas.length}: "${nombreTienda}"`, 'info');

        if (tiendasExistentesMap.has(nombreNormalizado)) {
          tiendaId = tiendasExistentesMap.get(nombreNormalizado);
          tiendasExistentes++;
          logImport(`   ↳ Tienda ya existe (ID: ${tiendaId}), se usarán sus productos`, 'warn');
        } else {
          try {
            const nuevaTienda = await apiPost('/api/tiendas', { nombre: nombreTienda });
            tiendaId = nuevaTienda.id;
            tiendasCreadas++;
            tiendasExistentesMap.set(nombreNormalizado, tiendaId);
            logImport(`   ✅ Tienda creada (ID: ${tiendaId})`, 'success');
          } catch (err) {
            logImport(`   ❌ Error al crear tienda: ${err.message}`, 'error');
            continue;
          }
        }

        const totalProd = tienda.inventario?.length || 0;
        logImport(`   📦 Procesando ${totalProd} productos...`, 'info');
        
        for (const item of (tienda.inventario || [])) {
          try {
            await apiPost('/api/productos', {
              tienda_id: tiendaId,
              codigo: String(item.id),
              nombre: item.producto,
              ubicacion: item.ubicacion || null
            });
            productosAgregados++;
            logImport(`      ➕ Producto agregado: [${item.id}] ${item.producto}`, 'success');
          } catch (err) {
            productosOmitidos++;
            if (err.message.includes('duplicate') || err.message.includes('ya existe')) {
              logImport(`      ⚠️ Producto omitido (duplicado): [${item.id}] ${item.producto}`, 'warn');
            } else {
              logImport(`      ❌ Error al agregar [${item.id}]: ${err.message}`, 'error');
            }
          }
        }
        logImport(`   🏁 Tienda "${nombreTienda}" completada.`, 'info');
      }

      logImport('🔄 Recargando datos desde el servidor...', 'info');
      await loadData();
      populateTiendas();
      renderManageList();
      document.getElementById('select-producto').innerHTML = '<option value="">-- Producto --</option>';
      document.getElementById('select-id').innerHTML = '<option value="">-- ID --</option>';

      const mensaje = `✅ Tiendas nuevas: ${tiendasCreadas} | Tiendas actualizadas: ${tiendasExistentes} | Productos agregados: ${productosAgregados} | Omitidos: ${productosOmitidos}`;
      logImport(`🎉 IMPORTACIÓN FINALIZADA: ${mensaje}`, 'success');
      showToast(mensaje, 'success');

    } catch(err) {
      logImport(`💥 Error crítico: ${err.message}`, 'error');
      showToast('Error al procesar el archivo JSON', 'danger');
      console.error(err);
    }
  };
  reader.readAsText(file);
}

/* ── BULK PRINT ─────────────────────────────────────── */
function openBulk() {
  const sel = document.getElementById('bulk-select-tienda');
  sel.innerHTML = '<option value="">-- Selecciona una tienda --</option>';
  appData.tiendas.forEach((t, i) => sel.add(new Option(t.nombre, i)));
  document.getElementById('bulk-list').innerHTML =
    '<div class="bulk-item"><span style="color:var(--muted)">Selecciona una tienda primero</span></div>';
  updateBulkCount();
  document.getElementById('bulk-overlay').classList.add('show');
}

function closeBulk() {
  document.getElementById('bulk-overlay').classList.remove('show');
}

function renderBulkList() {
  const idx = document.getElementById('bulk-select-tienda').value;
  const container = document.getElementById('bulk-list');
  if (idx === '' || !appData.tiendas[idx]) {
    container.innerHTML = '<div class="bulk-item"><span style="color:var(--muted)">Selecciona una tienda primero</span></div>';
    updateBulkCount();
    return;
  }
  const inv = [...appData.tiendas[idx].inventario].sort((a,b) => parseInt(a.id) - parseInt(b.id));
  if (!inv.length) {
    container.innerHTML = '<div class="bulk-item"><span style="color:var(--muted)">Sin productos</span></div>';
    return;
  }
  container.innerHTML = inv.map(item => `
    <div class="bulk-item" onclick="toggleBulkItem(this)">
      <input type="checkbox" onclick="event.stopPropagation();toggleBulkItem(this.closest('.bulk-item'))">
      <span class="b-id">#${item.id}</span>
      <span>${item.producto}</span>
    </div>
  `).join('');
  updateBulkCount();
}

function toggleBulkItem(row) {
  row.classList.toggle('selected');
  const cb = row.querySelector('input[type="checkbox"]');
  cb.checked = row.classList.contains('selected');
  updateBulkCount();
}

function bulkSelectAll() {
  document.querySelectorAll('.bulk-item').forEach(row => {
    row.classList.add('selected');
    const cb = row.querySelector('input[type="checkbox"]');
    if (cb) cb.checked = true;
  });
  updateBulkCount();
}

function bulkSelectNone() {
  document.querySelectorAll('.bulk-item').forEach(row => {
    row.classList.remove('selected');
    const cb = row.querySelector('input[type="checkbox"]');
    if (cb) cb.checked = false;
  });
  updateBulkCount();
}

function updateBulkCount() {
  const n = document.querySelectorAll('.bulk-item.selected').length;
  document.getElementById('bulk-selected-count').textContent = `${n} seleccionado${n !== 1 ? 's' : ''}`;
  document.getElementById('bulk-footer-count').textContent =
    n > 0 ? `${n} etiqueta${n !== 1 ? 's' : ''} para imprimir` : 'Selecciona productos para imprimir';
}

function printBulk() {
  const tiendaIdx = document.getElementById('bulk-select-tienda').value;
  const selected = [...document.querySelectorAll('.bulk-item.selected')];
  if (!selected.length) return showToast('Selecciona al menos un producto', 'danger');

  const tiendaNombre = appData.tiendas[tiendaIdx].nombre.toUpperCase();
  const logoSrc = localStorage.getItem(LOGO_KEY);

  const logoHTML = logoSrc
    ? `<img src="${logoSrc}" style="max-width:80%;max-height:1in;display:block;margin:0 auto">`
    : `<div style="font-family:'Space Mono',monospace;font-size:22pt;font-weight:700;color:#1a2a6c;letter-spacing:-1px;padding:14px 0 4px">Effi<span style="color:#f2a900">commerce</span></div>
       <div style="font-size:9pt;letter-spacing:2px;color:#7a80a0;text-transform:uppercase;margin-bottom:4px">Logística Interna</div>`;

  const labelsHTML = selected.map(row => {
    const id = row.querySelector('.b-id').textContent.replace('#', '');
    const nombre = row.querySelector('span:last-child').textContent.toUpperCase();
    const len = nombre.length;
    const size = len <= 12 ? '34pt' : len <= 20 ? '28pt' : len <= 30 ? '22pt' : len <= 45 ? '17pt' : '13pt';
    return `
      <div class="bulk-label">
        <div style="text-align:center;margin-bottom:10px">${logoHTML}</div>
        <div style="flex-grow:1;display:flex;align-items:center;justify-content:center;text-align:center">
          <h1 style="font-size:${size};margin:0;font-family:'Inter',sans-serif;line-height:1.1">${nombre}</h1>
        </div>
        <div style="border-top:4px solid #000;position:relative;text-align:center">
          <span style="position:absolute;top:85px;right:0;font-size:12pt;font-family:'Inter',sans-serif">${tiendaNombre}</span>
          <p style="font-size:50pt;font-weight:bold;margin:0;font-family:'Inter',sans-serif">ID: <span>${id}</span></p>
        </div>
      </div>`;
  }).join('');

  document.getElementById('bulk-print-area').innerHTML = labelsHTML;

  closeBulk();
  document.body.classList.add('print-bulk');
  window.print();
  document.body.classList.remove('print-bulk');
  document.getElementById('bulk-print-area').innerHTML = '';
}

/* ── UPDATE PREVIEW ─────────────────────────────────── */
function updatePreview() {
  const selTienda = document.getElementById('select-tienda');
  const selProd = document.getElementById('select-producto');
  const selId = document.getElementById('select-id');
  const tiendaName = selTienda.selectedIndex > 0
    ? selTienda.options[selTienda.selectedIndex].text : 'TIENDA';
  const prodName = selProd.selectedIndex > 0
    ? selProd.options[selProd.selectedIndex].text : 'PRODUCTO';
  const idVal = selId.value || '0000';

  document.getElementById('view-name').textContent = prodName.toUpperCase();
  document.getElementById('view-id').textContent = idVal;
  document.getElementById('view-tienda').textContent = tiendaName.toUpperCase();

  const len = prodName.length;
  const size = len <= 12 ? '34pt' : len <= 20 ? '28pt' : len <= 30 ? '22pt' : len <= 45 ? '17pt' : '13pt';
  document.getElementById('view-name').style.fontSize = size;

  const qrArea = document.getElementById('label-qr-area');
  const qrCode = document.getElementById('label-qr-code');
  const qrText = document.getElementById('label-qr-text');
  const tiendaIdx = selTienda.value;

  let ubicacion = '';
  if (tiendaIdx !== '' && selId.value && appData.tiendas[tiendaIdx]) {
    const item = appData.tiendas[tiendaIdx].inventario.find(i => i.id === selId.value);
    if (item && item.ubicacion) ubicacion = item.ubicacion;
  }

  if (ubicacion) {
    qrCode.innerHTML = QRCode.generate(ubicacion, 72);
    qrText.textContent = ubicacion;
    qrArea.classList.add('visible');
  } else {
    qrCode.innerHTML = '';
    qrText.textContent = '';
    qrArea.classList.remove('visible');
  }

  const fragilTienda = document.getElementById('fragil-tienda');
  if (fragilTienda) {
    fragilTienda.textContent = tiendaName.toUpperCase();
  }
}

/* ── INIT ──────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  await loadLogo();
  await loadRotuloLogo();

  const selTienda = document.getElementById('select-tienda');
  const selProd = document.getElementById('select-producto');
  const selId = document.getElementById('select-id');
  const selFormato = document.getElementById('select-formato');
  const etiqueta = document.getElementById('etiqueta');
  const searchInput = document.getElementById('search-producto');

  if (searchInput) {
    searchInput.addEventListener('input', filterProductos);
  }

  const savedToken = sessionStorage.getItem(SESSION_KEY);
  if (savedToken) {
    try {
      const res = await fetch('/api/tiendas', {
        headers: { 'Authorization': 'Bearer ' + savedToken }
      });
      if (res.ok) {
        activateCoord(savedToken);
        showToast('✅ Sesión restaurada', 'success');
      } else {
        sessionStorage.removeItem(SESSION_KEY);
      }
    } catch(e) {
      sessionStorage.removeItem(SESSION_KEY);
    }
  }

  populateTiendas();

  selTienda.addEventListener('change', () => {
    if (searchInput) searchInput.value = '';
    populateInventario(selTienda.value, selProd, selId);
  });

  selProd.addEventListener('change', () => {
    selId.value = selProd.value;
    updatePreview();
  });

  selId.addEventListener('change', () => {
    selProd.value = selId.value;
    updatePreview();
  });

  selFormato.addEventListener('change', () => {
    const formato = selFormato.value;
    etiqueta.classList.remove('solo-notas', 'fragil-mode');
    if (formato === 'solo-notas') {
      etiqueta.classList.add('solo-notas');
    } else if (formato === 'fragil') {
      etiqueta.classList.add('fragil-mode');
    }
    updatePreview();
  });

  document.getElementById('btn-print').addEventListener('click', () => {
    document.body.classList.add('print-single');
    window.print();
    document.body.classList.remove('print-single');
  });

  document.addEventListener('keydown', e => {
    const overlay = document.getElementById('pin-overlay');
    if (!overlay.classList.contains('show')) return;
    if (e.key === 'Escape') closePinModal();
  });

  if (searchInput) {
    searchInput.disabled = true;
  }
});
